async function apiGet() {
try {
const res = await fetch(API_URL);
const text = await res.text();
return JSON.parse(text);
} catch { return {}; }
}

async function apiPost(data) {

await fetch(API_URL, {
method:“POST”, mode:“no-cors”,
headers:{“Content-Type”:“application/json”},
body:JSON.stringify(data)
});
} catch(e){console.error(e);}
}

function ComplianceChart({data}) {
const mentorStats = MENTORS.map(mentor=>{
const residents=ASSIGNMENTS.filter(a=>a.mentor===mentor);
const total=residents.length*2;
let done=0;
residents.forEach(a=>{
const rec=data[a.resident]||{};
if(rec.session1date) done++;
if(rec.session2date) done++;
});
const pct=total>0?Math.round((done/total)*100):0;
return {mentor,count:residents.length,total,done,pct};
}).sort((a,b)=>b.pct-a.pct);

const totalSessions=mentorStats.reduce((s,m)=>s+m.total,0);
const totalDone=mentorStats.reduce((s,m)=>s+m.done,0);
const globalPct=totalSessions>0?Math.round((totalDone/totalSessions)*100):0;

const barColor=pct=>pct===0?”#ff4444”:pct<50?”#ff7722”:pct<100?”#ffaa00”:”#22c55e”;
const shortName=n=>{const p=n.split(” “);return p[0]+” “+p[p.length-1];};

return (
<div>
<div style={{background:”#1a1d27”,borderRadius:“16px”,padding:“20px 24px”,marginBottom:“20px”,border:“1px solid #2a2d3a”,display:“flex”,alignItems:“center”,justifyContent:“space-between”,flexWrap:“wrap”,gap:“16px”}}>
<div>
<p style={{color:”#9ca3af”,fontSize:“12px”,margin:“0 0 4px”,fontWeight:“600”,textTransform:“uppercase”,letterSpacing:“0.6px”}}>Cumplimiento global</p>
<p style={{color:”#f0f0f5”,fontSize:“32px”,fontWeight:“800”,margin:0}}>{globalPct}%</p>
<p style={{color:”#6b7280”,fontSize:“13px”,margin:“4px 0 0”}}>{totalDone} de {totalSessions} sesiones realizadas</p>
</div>
<svg width="80" height="80" viewBox="0 0 80 80">
<circle cx="40" cy="40" r="32" fill="none" stroke="#2a2d3a" strokeWidth="10"/>
<circle cx=“40” cy=“40” r=“32” fill=“none” stroke={barColor(globalPct)} strokeWidth=“10”
strokeDasharray={`${2*Math.PI*32*globalPct/100} ${2*Math.PI*32}`}
strokeLinecap=“round” transform=“rotate(-90 40 40)”/>
<text x="40" y="45" textAnchor="middle" fill="#f0f0f5" fontSize="14" fontWeight="800">{globalPct}%</text>
</svg>
</div>
<div style={{background:”#1a1d27”,borderRadius:“16px”,padding:“20px 24px”,border:“1px solid #2a2d3a”}}>
<p style={{color:”#9ca3af”,fontSize:“12px”,margin:“0 0 18px”,fontWeight:“600”,textTransform:“uppercase”,letterSpacing:“0.6px”}}>Por mentor · mayor a menor</p>
<div style={{display:“flex”,flexDirection:“column”,gap:“14px”}}>
{mentorStats.map(m=>(
<div key={m.mentor}>
<div style={{display:“flex”,justifyContent:“space-between”,alignItems:“center”,marginBottom:“5px”}}>
<span style={{color:”#e5e7eb”,fontSize:“13px”,fontWeight:“600”}}>{shortName(m.mentor)}</span>
<div style={{display:“flex”,alignItems:“center”,gap:“10px”}}>
<span style={{color:”#6b7280”,fontSize:“11px”}}>{m.done}/{m.total}</span>
<span style={{color:barColor(m.pct),fontSize:“13px”,fontWeight:“800”,minWidth:“38px”,textAlign:“right”}}>{m.pct}%</span>
</div>
</div>
<div style={{height:“10px”,borderRadius:“99px”,background:”#0f1117”,overflow:“hidden”}}>
<div style={{height:“100%”,width:`${m.pct}%`,borderRadius:“99px”,minWidth:m.pct>0?“8px”:“0”,
background:m.pct===100?“linear-gradient(90deg,#22c55e,#16a34a)”:m.pct>=50?“linear-gradient(90deg,#ffaa00,#e08800)”:m.pct>0?“linear-gradient(90deg,#ff7722,#cc4400)”:”#ff4444”
}}/>
</div>
<p style={{color:”#4b5563”,fontSize:“10px”,margin:“3px 0 0”}}>{m.count} residente{m.count!==1?“s”:””} · meta: {m.total} sesiones</p>
</div>
))}
</div>
</div>
</div>
);
}

function ResidentView({data,onSave}) {
const [name,setName]=useState(””);
const [step,setStep]=useState(“select”);
const [actionDone,setActionDone]=useState(””);
const [notes,setNotes]=useState(””);
const [saving,setSaving]=useState(false);
const rec=data[name]||{};
const s1=!!rec.session1date,s2=!!rec.session2date;

async function confirmSession(n) {
setSaving(true);
const today=new Date().toLocaleDateString(“es-MX”);
await onSave({…data,[name]:{…rec,[`session${n}date`]:today}});
setSaving(false);
setActionDone(`Sesión ${n} registrada`);
setStep(“done”);
}
async function sendRequest() {
setSaving(true);
const req={date:new Date().toLocaleDateString(“es-MX”),notes:notes.trim()||“Sin notas adicionales”};
await onSave({…data,[name]:{…rec,requests:[…(rec.requests||[]),req]}});
setSaving(false);
setActionDone(“Solicitud enviada”);
setStep(“done”);
}

if(saving) return <Spinner msg="Guardando..."/>;

return (

function MentorLogin({onLogin}) {
const [pw,setPw]=useState(””); const [error,setError]=useState(false);
function tryLogin(){if(pw===MENTOR_PASSWORD)onLogin();else{setError(true);setTimeout(()=>setError(false),1500);}}
return (
<div style={{minHeight:“100vh”,background:”#0f1117”,display:“flex”,alignItems:“center”,justifyContent:“center”,padding:“24px”}}>
<div style={{background:”#1a1d27”,borderRadius:“20px”,padding:“40px 32px”,width:“100%”,maxWidth:“360px”,border:“1px solid #2a2d3a”,boxShadow:“0 20px 60px rgba(0,0,0,0.5)”}}>

<p style={{color:”#6b7280”,fontSize:“13px”,marginTop:“6px”}}>Dashboard de seguimiento</p>
</div>
<input type=“password” placeholder=“Contraseña” value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key===“Enter”&&tryLogin()}
style={{width:“100%”,padding:“12px 14px”,background:error?“rgba(255,68,68,0.1)”:”#0f1117”,border:`1.5px solid ${error?"#ff4444":"#2a2d3a"}`,borderRadius:“10px”,color:”#f0f0f5”,fontSize:“15px”,outline:“none”,boxSizing:“border-box”}}/>

const stats={none:0,one:0,full:0};
ASSIGNMENTS.forEach(a=>{
const rec=data[a.resident]||{};
if(!rec.session1date)stats.none++;
else if(!rec.session2date)stats.one++;
else stats.full++;
});

const allRequests=[];
ASSIGNMENTS.forEach(a=>{
(data[a.resident]?.requests||[]).forEach((req,i)=>{
allRequests.push({name:a.resident,mentor:a.mentor,origIdx:i,…req});
});
});

async function clearRequest(resName,origIdx){
setSaving(true);
const updated={…data};
const reqs=[…(updated[resName]?.requests||[])];
reqs.splice(origIdx,1);
updated[resName]={…updated[resName],requests:reqs};
await onSave(updated);
setSaving(false);
}

return mf&&mm&&ms;

function App() {
const [view,setView]=useState(“home”);
const [mentorAuthed,setMentorAuthed]=useState(false);
const [data,setData]=useState(null);

useEffect(()=>{apiGet().then(d=>setData(d||{}));},[]);

async function saveData(updated){
setData(updated);
await apiPost(updated);
}

if(data===null) return <Spinner msg="Cargando datos..."/>;
if(view===“resident”) return <ResidentView data={data} onSave={saveData}/>;
if(view===“mentorLogin”&&!mentorAuthed) return <MentorLogin onLogin={()=>{setMentorAuthed(true);setView(“mentor”);}}/>;
if(view===“mentor”&&mentorAuthed) return <MentorDashboard data={data} onSave={saveData} onLogout={()=>{setMentorAuthed(false);setView(“home”);}}/>;

return (
<div style={{minHeight:“100vh”,background:”#0f1117”,display:“flex”,flexDirection:“column”,alignItems:“center”,justifyContent:“center”,padding:“24px”}}>
<div style={{background:”#1a1d27”,borderRadius:“24px”,padding:“44px 32px”,width:“100%”,maxWidth:“380px”,border:“1px solid #2a2d3a”,boxShadow:“0 24px 64px rgba(0,0,0,0.6)”,textAlign:“center”}}>
<div style={{width:“64px”,height:“64px”,borderRadius:“18px”,background:“linear-gradient(135deg,#6366f1,#8b5cf6)”,display:“flex”,alignItems:“center”,justifyContent:“center”,margin:“0 auto 20px”,fontSize:“32px”}}>🎓</div>
<h1 style={{color:”#f0f0f5”,margin:“0 0 6px”,fontFamily:”‘Space Grotesk’,sans-serif”,fontSize:“24px”}}>Mentoreo EMCS</h1>
<p style={{color:”#6b7280”,fontSize:“13px”,margin:“0 0 4px”}}>Programa Multicéntrico de Anestesiología</p>
<p style={{color:”#4b5563”,fontSize:“12px”,margin:“0 0 32px”}}>2026 – 2027</p>
<div style={{display:“flex”,flexDirection:“column”,gap:“12px”}}>
<button onClick={()=>setView(“resident”)} style={{padding:“16px”,background:“linear-gradient(135deg,#6366f1,#8b5cf6)”,color:”#fff”,border:“none”,borderRadius:“12px”,fontSize:“15px”,fontWeight:“700”,cursor:“pointer”}}>
👩‍⚕️ Soy residente
</button>
<button onClick={()=>setView(“mentorLogin”)} style={{padding:“16px”,background:”#1e2130”,color:”#9ca3af”,border:“1.5px solid #2a2d3a”,borderRadius:“12px”,fontSize:“15px”,fontWeight:“700”,cursor:“pointer”}}>
🔒 Acceso mentor
</button>
</div>
</div>
<p style={{color:”#374151”,fontSize:“11px”,marginTop:“20px”}}>© 2026 · EMCS · Tecnológico de Monterrey</p>
</div>
);
}

ReactDOM.createRoot(document.getElementById(“root”)).render(<App/>);
</script>
